# ========================================
# Supports MemoryBank, ReID model, cross-view association
# ========================================

# ========================================
# Basic configuration
# ========================================
GIT_VERSION:
MODE: submit  # Inference mode
CONFIG_PATH:
VISUALIZE: False
AVAILABLE_GPUS: '2'  # Inference typically uses a single GPU
DEVICE: cuda
USE_DISTRIBUTED: False  # Distributed mode not needed for inference (unless dataset is very large)
USE_CHECKPOINT: True

# ========================================
# Inference output configuration
# ========================================
SUBMIT_DIR: /xxxx/MeMOTR-main/outputs/uav_multiview_reid  # Training output directory (contains model weights)
SUBMIT_MODEL1: model_checkpoint.pth  # Main model weight filename
SUBMIT_MODEL2: reid_checkpoint.pth   # ReID model weight filename
SUBMIT_DATA_SPLIT: test # Inference dataset split: 'test' or 'val'

# ========================================
# Dataset configuration
# ========================================
DATASET: UAV_V
DATA_ROOT: /xxx/MeMOTR-main/dataset
NUM_WORKERS: 4  # Fewer workers are sufficient for inference
VIEW_POINT: 5  # Number of viewpoints (must match training)

# ========================================
# Model configuration (must match training exactly)
# ========================================
BACKBONE: resnet50
HIDDEN_DIM: 256
FFN_DIM: 2048
NUM_FEATURE_LEVELS: 4
NUM_HEADS: 8
NUM_ENC_POINTS: 4
NUM_DEC_POINTS: 4
NUM_ENC_LAYERS: 6
NUM_DEC_LAYERS: 6
MERGE_DET_TRACK_LAYER: 1
ACTIVATION: ReLU
RETURN_INTER_DEC: True
EXTRA_TRACK_ATTN: False
AUX_LOSS: True
USE_DAB: True
UPDATE_THRESH: 0.5
LONG_MEMORY_LAMBDA: 0.01
NUM_DET_QUERIES: 300

# ========================================
# ReID model configuration (must match training exactly)
# ========================================
REID_MODEL: Transformer
REID_LOSS: True  

# ReID model selection (must match training)
USE_SIMPLE_REID: False # Must match training config
REID_MLP_LAYERS: 2
REID_DROPOUT: 0.1

# Transformer ReID model configuration (kept for compatibility)
QUERY_DIM: 256
EMBED_DIM: 256
NUM_REID: 1620
NUM_CLASS: 1620
REID_USE_TRANSFORMER: False
REID_TRANSFORMER_LAYERS: 2

# ReID classification head configuration (kept for compatibility)
ID_LOSS_TYPE: 'arcface'
COSINE_SCALE: 30.0
COSINE_MARGIN: 0.5
NECK: 'bnneck'
NECK_FEAT: 'after'

# ReID Pool configuration
MAX_FORGET_LENGTH: 3000  # ReIDPool history length
KEEP_ALL_BATCH_REID: True
REID_UPDATE_WEIGHT: 0.8

# ========================================
# MemoryBank configuration
# ========================================
MEMORY_BANK_LEN: 30  # Limit stored length during inference to avoid OOM
TEMPORAL_K: 5  # Number of historical frames for temporal update
DECAY_ALPHA: 0.25  # Temporal decay coefficient
REID_UPDATE_WEIGHT: 0.1  # ReID feature update weight

# Query update configuration (cross-frame and cross-view)

ENABLE_CROSS_FRAME_UPDATE: True  # Enable cross-frame query update
ENABLE_CROSS_VIEW_UPDATE: False  # Disable cross-view query update (association is required first to know same ID)
MEMORY_TAU_FRAMES: 5  # Use the most recent 5 frames for cross-frame update
MEMORY_TIME_DECAY_ALPHA: 0.1  # Time decay coefficient

# Query update after association during inference
USE_REID_QUERY_UPDATE: True  # Whether to update query with ReID features after association (for next frame)
REID_UPDATE_WEIGHT: 0.1  # ReID feature update weight

# ========================================
# Inference-specific parameters
# ========================================
# Detection and tracking thresholds
DET_SCORE_THRESH: 0.5     # Detection threshold (can be lowered to increase recall)
TRACK_SCORE_THRESH: 0.5   # Tracking threshold
RESULT_SCORE_THRESH: 0.5  # Final output score threshold

# Target loss tolerance
MISS_TOLERANCE: 30  # Frames before deleting a lost target (can be increased for occlusion)

# Motion prediction (optional)
USE_MOTION: False          # Whether to use motion prediction
MOTION_MIN_LENGTH: 3      # Minimum motion history length
MOTION_MAX_LENGTH: 10     # Maximum motion history length
MOTION_LAMBDA: 0.5        # Motion prediction weight

# ========================================
# NMS deduplication configuration (usually not needed for DETR-like architectures)
# ========================================
# Original paper and code do not use NMS; keep disabled by default
USE_NMS: False             # Whether to enable NMS deduplication (default False, usually not needed)
NMS_IOU_THRESHOLD: 0.7     # NMS IoU threshold (only effective when USE_NMS=True)

# ========================================
# View ID offset configuration (cross-view association)
# ========================================
USE_VIEW_ID_OFFSET: False  # View ID offset
VIEW_ID_OFFSET: 0          # Offset value (set to 0 when unused)

WINDOW_SIZE: 10  # Voting window size (frame-level voting)
MIN_VOTES: 7    # Minimum vote count

# Core cross-view association configuration
CROSS_VIEW_THRESHOLD: 0.5 
CROSS_VIEW_DISTANCE: euclidean  # Distance metric


CACHE_IMAGES: False  

# Neighbor filtering mechanism
USE_NEIGHBOR_FILTER: True  # Whether to enable neighbor filtering
NEIGHBOR_SPATIAL_RADIUS: 100  # Spatial neighborhood radius (pixels), circle centered on target
NEIGHBOR_K_TOP: 6  # For each neighbor, consider top-K matches by similarity
NEIGHBOR_MIN_MATCH_RATIO: 0.5  # Minimum neighbor match ratio (reject association below this)
NEIGHBOR_SIM_THRESHOLD: 0.6  # Similarity threshold between neighbors
NEIGHBOR_DISTANCE_METRIC: "cosine"  # Distance metric: cosine, euclidean
